name: Deploy to DigitalOcean

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-api:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Define API image metadata
        id: meta
        run: |
          echo "image=ghcr.io/${{ github.repository_owner }}/zentra-api-production:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/production/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ghcr.io/${{ github.repository_owner }}/zentra-api-production:latest

  build-ocr:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Define OCR image metadata
        id: meta
        run: |
          echo "image=ghcr.io/${{ github.repository_owner }}/zentra-image-extractor-production:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push OCR image
        uses: docker/build-push-action@v6
        with:
          context: ./services/image_recognition_service
          file: ./services/image_recognition_service/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ghcr.io/${{ github.repository_owner }}/zentra-image-extractor-production:latest

  deploy:
    needs:
      - build-api
      - build-ocr
    runs-on: ubuntu-latest
    env:
      OP_ENVIRONMENT_ID: m5yflcyljim7b6fgc6hcjssca4

    steps:
      - name: Configure 1Password
        uses: 1password/load-secrets-action/configure@v2
        with:
          service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install 1Password CLI beta
        uses: 1password/install-cli-action@v2
        with:
          version: latest-beta

      - name: Load deployment secrets from 1Password Environment
        run: |
          op run --environment "$OP_ENVIRONMENT_ID" -- /bin/sh -c '
            printf "DO_HOST=%s\n" "$DO_HOST" >> "$GITHUB_ENV"
            printf "DO_USERNAME=%s\n" "$DO_USERNAME" >> "$GITHUB_ENV"
            printf "DO_SSH_KEY_B64=%s\n" "$DO_SSH_KEY_B64" >> "$GITHUB_ENV"
          '

      - name: Decode SSH private key
        run: |
          {
            printf 'DO_SSH_KEY<<__KEY__\n'
            printf "%s" "$DO_SSH_KEY_B64" | tr -d "[:space:]" | base64 --decode
            printf '\n__KEY__\n'
          } >> "$GITHUB_ENV"

      - name: Render production environment file from 1Password Environment
        run: |
          op run --no-masking --environment "$OP_ENVIRONMENT_ID" -- python3 - <<'PYENV' > .github/zentra.env.production
          import os
          from pathlib import Path

          template_path = Path('.env.production.example')

          for raw_line in template_path.read_text().splitlines():
              line = raw_line.strip()
              if not line or line.startswith('#') or '=' not in line:
                  continue

              key = line.split('=', 1)[0].strip()
              if key not in os.environ:
                  continue

              value = os.environ[key].strip()
              if len(value) >= 2 and ((value[0] == value[-1]) and value[0] in {'"', "'"}):
                  value = value[1:-1]
              value = value.replace("\r\n", "\n").replace("\n", "\\n")
              print(f"{key}={value}")
          PYENV

      - name: Upload production environment file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DO_HOST }}
          username: ${{ env.DO_USERNAME }}
          key: ${{ env.DO_SSH_KEY }}
          command_timeout: 90m
          source: .github/zentra.env.production
          target: /tmp/

      - name: Deploy on DigitalOcean Droplet
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ env.DO_HOST }}
          username: ${{ env.DO_USERNAME }}
          key: ${{ env.DO_SSH_KEY }}
          command_timeout: 90m
          script: |
            set -euo pipefail

            APP_ROOT="${{ secrets.DO_APP_ROOT }}"
            if [ -z "$APP_ROOT" ]; then
              APP_ROOT="/home/${{ env.DO_USERNAME }}/apps/zentra"
            fi

            BACKEND_DIR="$APP_ROOT/zentra-backend"

            mkdir -p "$APP_ROOT"

            if [ ! -d "$BACKEND_DIR/.git" ]; then
              git clone https://github.com/josedan10/finance-bot.git "$BACKEND_DIR"
            fi

            cd "$BACKEND_DIR"
            git fetch origin master
            git checkout master
            git pull --ff-only origin master

            cd "$BACKEND_DIR"

            cp /tmp/.github/zentra.env.production "$BACKEND_DIR/.env.production"
            printf '\nAPI_IMAGE=%s\n' '${{ needs.build-api.outputs.image }}' >> "$BACKEND_DIR/.env.production"
            printf 'OCR_IMAGE=%s\n' '${{ needs.build-ocr.outputs.image }}' >> "$BACKEND_DIR/.env.production"
            chmod 600 "$BACKEND_DIR/.env.production"

            bash scripts/deploy-production.sh
