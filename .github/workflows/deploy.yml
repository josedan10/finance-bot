name: Deploy to DigitalOcean

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure 1Password
        uses: 1password/load-secrets-action/configure@v2
        with:
          service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Load deployment secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          DO_HOST: op://zentra-prod/github-actions/do-host/value
          DO_SSH_KEY: op://zentra-prod/github-actions/do-ssh-key/private_key

      - name: Deploy on DigitalOcean Droplet
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ env.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ env.DO_SSH_KEY }}
          script: |
            set -euo pipefail

            APP_ROOT="${{ secrets.DO_APP_ROOT }}"
            if [ -z "$APP_ROOT" ]; then
              APP_ROOT="/opt/zentra"
            fi

            BACKEND_DIR="$APP_ROOT/finance-bot"

            mkdir -p "$APP_ROOT"

            if [ ! -d "$BACKEND_DIR/.git" ]; then
              git clone https://github.com/josedan10/finance-bot.git "$BACKEND_DIR"
            fi

            cd "$BACKEND_DIR"
            git fetch origin master
            git checkout master
            git pull --ff-only origin master

            cd "$BACKEND_DIR"
            chmod +x scripts/deploy-production.sh
            ./scripts/deploy-production.sh
