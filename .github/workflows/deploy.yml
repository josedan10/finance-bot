name: Deploy to DigitalOcean

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

jobs:
  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Verify API build
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Define API image metadata
        id: meta
        run: |
          echo "image=ghcr.io/${{ github.repository_owner }}/zentra-api-production:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: docker/production/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ghcr.io/${{ github.repository_owner }}/zentra-api-production:latest

  deploy:
    needs:
      - build-api
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      OP_ENVIRONMENT_ID: m5yflcyljim7b6fgc6hcjssca4

    steps:
      - name: Configure 1Password
        uses: 1password/load-secrets-action/configure@581a835fb51b8e7ec56b71cf2ffddd7e68bb25e0
        with:
          service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Install 1Password CLI beta
        uses: 1password/install-cli-action@c1b138d5779f64eda6936d5caa8e754b9f3996c0
        with:
          version: latest-beta

      - name: Load deployment secrets from 1Password Environment
        run: |
          op run --environment "$OP_ENVIRONMENT_ID" -- /bin/sh -c '
            printf "DO_HOST=%s\n" "$DO_HOST" >> "$GITHUB_ENV"
            printf "DO_USERNAME=%s\n" "$DO_USERNAME" >> "$GITHUB_ENV"
            printf "DO_SSH_KEY_B64=%s\n" "$DO_SSH_KEY_B64" >> "$GITHUB_ENV"
            printf "SENTRY_AUTH_TOKEN=%s\n" "$SENTRY_AUTH_TOKEN" >> "$GITHUB_ENV"
            printf "SENTRY_ORG=%s\n" "$SENTRY_ORG" >> "$GITHUB_ENV"
            printf "SENTRY_PROJECT=%s\n" "$SENTRY_PROJECT" >> "$GITHUB_ENV"
          '

      - name: Decode SSH private key
        run: |
          {
            printf 'DO_SSH_KEY<<__KEY__\n'
            printf "%s" "$DO_SSH_KEY_B64" | tr -d "[:space:]" | base64 --decode
            printf '\n__KEY__\n'
          } >> "$GITHUB_ENV"

      - name: Render production environment file from 1Password Environment
        run: |
          op run --no-masking --environment "$OP_ENVIRONMENT_ID" -- python3 - <<'PYENV' > .github/zentra.env.production
          import os
          from pathlib import Path

          template_path = Path('.env.production.example')

          for raw_line in template_path.read_text().splitlines():
              line = raw_line.strip()
              if not line or line.startswith('#') or '=' not in line:
                  continue

              key = line.split('=', 1)[0].strip()
              if key not in os.environ:
                  continue

              value = os.environ[key].strip()
              if len(value) >= 2 and ((value[0] == value[-1]) and value[0] in {'"', "'"}):
                  value = value[1:-1]
              value = value.replace("\r\n", "\n").replace("\n", "\\n")
              print(f"{key}={value}")
          PYENV

      - name: Upload production environment file
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634
        with:
          host: ${{ env.DO_HOST }}
          username: ${{ env.DO_USERNAME }}
          key: ${{ env.DO_SSH_KEY }}
          command_timeout: 90m
          source: .github/zentra.env.production
          target: /tmp/

      - name: Render Firebase service account file from 1Password Environment
        run: |
          op run --no-masking --environment "$OP_ENVIRONMENT_ID" -- python3 - <<'PYJSON' > .github/firebase-service-account.json
          import json, os
          from pathlib import Path

          template = Path('firebase-service-account.template.json').read_text()
          fields = {
              'FIREBASE_PROJECT_ID': os.environ['FIREBASE_PROJECT_ID'].strip(),
              'FIREBASE_PRIVATE_KEY_ID': os.environ['FIREBASE_PRIVATE_KEY_ID'].strip(),
              'FIREBASE_PRIVATE_KEY': os.environ['FIREBASE_PRIVATE_KEY'].strip().replace('\r\n', '\n').replace('\n', '\\n'),
              'FIREBASE_CLIENT_EMAIL': os.environ['FIREBASE_CLIENT_EMAIL'].strip(),
              'FIREBASE_CLIENT_ID': os.environ['FIREBASE_CLIENT_ID'].strip(),
              'FIREBASE_CLIENT_X509_CERT_URL': os.environ['FIREBASE_CLIENT_X509_CERT_URL'].strip(),
          }
          content = template
          for key, value in fields.items():
              content = content.replace('${' + key + '}', value)
          print(json.dumps(json.loads(content), indent=2))
          PYJSON

      - name: Upload Firebase service account file
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634
        with:
          host: ${{ env.DO_HOST }}
          username: ${{ env.DO_USERNAME }}
          key: ${{ env.DO_SSH_KEY }}
          command_timeout: 90m
          source: .github/firebase-service-account.json
          target: /tmp/


      - name: Deploy on DigitalOcean Droplet
        uses: appleboy/ssh-action@2ead5e36573f08b82fbfce1504f1a4b05a647c6f
        with:
          host: ${{ env.DO_HOST }}
          username: ${{ env.DO_USERNAME }}
          key: ${{ env.DO_SSH_KEY }}
          command_timeout: 90m
          script: |
            set -euo pipefail

            APP_ROOT="${{ secrets.DO_APP_ROOT }}"
            if [ -z "$APP_ROOT" ]; then
              APP_ROOT="/home/${{ env.DO_USERNAME }}/apps/zentra"
            fi

            BACKEND_DIR="$APP_ROOT/zentra-backend"

            mkdir -p "$APP_ROOT"

            if [ ! -d "$BACKEND_DIR/.git" ]; then
              git clone https://github.com/josedan10/finance-bot.git "$BACKEND_DIR"
            fi

            cd "$BACKEND_DIR"
            git fetch --prune origin
            git checkout --detach "${{ github.sha }}"

            mkdir -p "$BACKEND_DIR/secrets"
            cp /tmp/.github/zentra.env.production "$BACKEND_DIR/.env.production"
            cp /tmp/.github/firebase-service-account.json "$BACKEND_DIR/secrets/firebase-service-account.json"
            printf '\nSENTRY_RELEASE=%s\n' '${{ github.sha }}' >> "$BACKEND_DIR/.env.production"
            printf '\nAPI_IMAGE=%s\n' '${{ needs.build-api.outputs.image }}' >> "$BACKEND_DIR/.env.production"
            chmod 600 "$BACKEND_DIR/.env.production"
            chmod 600 "$BACKEND_DIR/secrets/firebase-service-account.json"

            bash scripts/deploy-production.sh

      - name: Create Sentry release
        run: |
          npx @sentry/cli releases new "$GITHUB_SHA"
          npx @sentry/cli releases set-commits "$GITHUB_SHA" --auto --ignore-missing
          npx @sentry/cli releases finalize "$GITHUB_SHA"
