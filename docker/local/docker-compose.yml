services:
  express-bot-api:
    image: express-api-bot
    platform: linux/amd64
    build:
      context: ../../
      dockerfile: docker/local/Dockerfile

    environment:
      - PORT=4001
      - TEST_CHAT_ID=1
      - TELEGRAM_BOT_TOKEN=dummy-token-for-local-dev
      - DATABASE_URL=mysql://root:d!YG19j06eXp@local-mysql-finance-bot-1:3306/finance-bot
      - REDIS_URL=redis://redis-finance-bot:6379
    ports:
      - '4001:4001'
    networks:
      - finance-bot-network
    depends_on:
      - mysql-finance-bot
      - redis-finance-bot
    command: sh -c "npx prisma generate && npm run dev"
    volumes:
      - ../../:/app
      - /app/node_modules
