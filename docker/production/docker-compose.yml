networks:
  finance-bot-production-network:
    driver: bridge

services:
  express-bot-production-api:
    image: express-api-bot
    platform: linux/amd64
    build:
      context: ../../
      dockerfile: docker/production/Dockerfile

    env_file:
      - ../../.env
    environment:
      - REDIS_URL=redis://redis-finance-bot-production:6379
    ports:
      - '5000:5000'
    networks:
      - finance-bot-production-network
    depends_on:
      - mysql-finance-bot-production
      - redis-finance-bot-production
    volumes:
      - ../../dist:/app/dist
      - /app/node_modules
