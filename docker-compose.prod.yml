services:
  traefik:
    image: traefik:v3.6
    container_name: zentra-traefik
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL:-admin@zentra-app.pro}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --ping=true
      - --accesslog=true
      - --log.level=${TRAEFIK_LOG_LEVEL:-INFO}
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    healthcheck:
      test: ['CMD', 'traefik', 'healthcheck', '--ping']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - zentra-production-network


  redis-zentra-production:
    image: redis:7-alpine
    container_name: zentra-redis-production
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - zentra-production-network

  zentra-api-production:
    image: ${API_IMAGE:-zentra-api-production}
    container_name: zentra-api-production
    restart: unless-stopped
    depends_on:
      redis-zentra-production:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://zentra-redis-production:6379
      PORT: 5000
      NODE_ENV: production
      APP_MODE: production
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TEST_CHAT_ID: ${TEST_CHAT_ID:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      RECEIPT_UPLOAD_MAX_FILE_SIZE_BYTES: ${RECEIPT_UPLOAD_MAX_FILE_SIZE_BYTES:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0}
      SENTRY_PROFILES_SAMPLE_RATE: ${SENTRY_PROFILES_SAMPLE_RATE:-0}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@zentra-app.pro}
    volumes:
      - ./secrets/firebase-service-account.json:/app/firebase-service-account.json:ro
      - ./public:/app/public
    labels:
      - traefik.enable=true
      - traefik.http.routers.zentra-api.rule=Host(`${API_DOMAIN:-api.zentra-app.pro}`)
      - traefik.http.routers.zentra-api.entrypoints=websecure
      - traefik.http.routers.zentra-api.tls=true
      - traefik.http.routers.zentra-api.tls.certresolver=letsencrypt
      - traefik.http.services.zentra-api.loadbalancer.server.port=5000
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:5000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - zentra-production-network

networks:
  zentra-production-network:
    name: zentra-production-network
    driver: bridge

volumes:
  redis_data:
  traefik_letsencrypt:
